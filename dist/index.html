<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#120d08" />
    <meta name="description" content="An interactive captain's journal rendered in WebGL." />
    <title>Interactive Captain's Journal</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <script type="module" crossorigin src="/assets/index-CerTN7CJ.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-LRN2CMKo.css">
  </head>
  <body>
    <main class="experience" aria-label="Interactive captain's journal">
      <canvas id="scene" aria-hidden="true"></canvas>

      <div class="grain" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>
      <div class="light-leak" aria-hidden="true"></div>

      <nav class="chapter-rail" aria-label="Chapters">
        <span class="rail-label">Captain’s Log</span>
        <ol>
          <li class="active">01</li><li>02</li><li>03</li><li>04</li><li>05</li>
          <li>06</li><li>07</li><li>08</li><li>09</li><li>10</li>
        </ol>
      </nav>

      <section class="photo-dock" aria-label="Journal editing controls">
        <div class="photo-strip" aria-label="Uploaded voyage photos">
          <p class="photo-strip__empty">Your voyage photos will appear here</p>
        </div>
        <div class="utility-controls">
          <button class="utility-button add-photo" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" /></svg>
            <span>Add Photo</span>
          </button>
          <button class="utility-button edit-page" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h4L19 9l-4-4L4 16v4ZM13.5 6.5l4 4" /></svg>
            <span>Edit Page</span>
          </button>
          <button class="utility-button settings-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6 7 7M17 17l1.4 1.4M18.4 5.6 17 7M7 17l-1.4 1.4"/></svg>
            <span>Settings</span>
          </button>
          <button class="utility-button close-book" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h11a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3V4Zm0 0v13a3 3 0 0 0 3 3M9 8h6"/></svg>
            <span>Close Book</span>
          </button>
          <input class="photo-input" type="file" accept="image/*" multiple hidden />
        </div>
      </section>

      <div class="toast" role="status" aria-live="polite"></div>

      <section class="story-ui" aria-label="Book controls">
        <div class="chapter" aria-live="polite">
          <span class="chapter__index">01</span>
          <span class="chapter__rule"></span>
          <div>
            <small>Chapter</small>
            <strong class="chapter__title">The Journey Begins</strong>
          </div>
        </div>

        <div class="controls controls--side">
          <button class="control control--prev" type="button" aria-label="Previous page">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5l-7 7 7 7" /></svg>
            <span>Prev Page</span>
          </button>
          <p><span class="page-current">01</span><i></i><span class="page-total">50</span></p>
          <button class="control control--next" type="button" aria-label="Next page">
            <span>Next Page</span>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5l7 7-7 7" /></svg>
          </button>
        </div>

        <p class="hint"><span></span> Scroll or Drag to Explore</p>
      </section>

      <div class="loader" role="status" aria-label="Loading the archive">
        <div class="loader__monogram">P</div>
        <p>Unrolling the chart</p>
        <div class="loader__track"><span></span></div>
      </div>

      <noscript>This experience requires JavaScript and WebGL.</noscript>
    </main>
  </body>
</html>
